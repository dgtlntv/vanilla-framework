<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="{{ versioned_static('build/css/build.css') }}" />

    <style>
      .grid-parent {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin: 2rem;
        overflow: hidden;
        gap: 1rem;
      }

      .children {
        border: 2px solid rgb(214, 214, 214);
        padding: 10px;
      }
    </style>
  </head>
  <body class="">
    <div class="grid-parent">
      {% for example in examples %}
      <div class="children">
        <h4>{{ example.title }}</h4>
        {{ example.content | safe }}
      </div>
      {% endfor %}
    </div>
  </body>
</html>
